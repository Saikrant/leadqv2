<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body {
    background: #000;
    margin: 0;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }
  
  .ribbon-container {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    /* Use mask to hide edges so it looks continuous */
  }

  .ribbon {
    position: absolute;
    border-radius: 50%;
    border-top: 2px solid #fff;
    filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.8)) drop-shadow(0 0 40px rgba(139, 92, 246, 0.6));
    box-shadow: inset 0 20px 40px -20px rgba(217, 70, 239, 0.5), 0 -30px 60px -20px rgba(76, 40, 220, 0.6);
  }

  .ribbon-1 {
    width: 150vw;
    height: 400px;
    top: 20%;
    left: -25vw;
    transform: rotate(-10deg);
    border-color: rgba(255,255,255,0.9);
    animation: wave-1 8s infinite alternate ease-in-out;
  }

  .ribbon-2 {
    width: 180vw;
    height: 500px;
    top: 30%;
    left: -40vw;
    transform: rotate(15deg);
    border-color: rgba(255,255,255,0.6);
    filter: drop-shadow(0 0 30px rgba(76, 40, 220, 0.8));
    animation: wave-2 12s infinite alternate ease-in-out;
  }
  
  .ribbon-3 {
    width: 120vw;
    height: 300px;
    top: 40%;
    left: -10vw;
    transform: rotate(-5deg);
    border-color: rgba(255,255,255,0.5);
    filter: drop-shadow(0 0 15px rgba(217, 70, 239, 0.7));
    animation: wave-3 10s infinite alternate ease-in-out;
  }

  @keyframes wave-1 {
    0% { transform: translateY(0) rotate(-10deg) scaleX(1); }
    100% { transform: translateY(-50px) rotate(-5deg) scaleX(1.1); }
  }
  @keyframes wave-2 {
    0% { transform: translateY(0) rotate(15deg) scaleX(1); }
    100% { transform: translateY(60px) rotate(8deg) scaleX(1.05); }
  }
  @keyframes wave-3 {
    0% { transform: translateY(0) rotate(-5deg) scaleX(1); }
    100% { transform: translateY(40px) rotate(-12deg) scaleX(1.15); }
  }

  /* Hotspots / Lens flare */
  .flare {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(168,85,247,0.4) 20%, transparent 70%);
    mix-blend-mode: screen;
  }
  
  .flare-1 {
    top: 15%;
    left: 20%;
    animation: float-flare 6s infinite alternate;
  }
  .flare-2 {
    top: 40%;
    left: 70%;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(76,40,220,0.5) 15%, transparent 60%);
    animation: float-flare 9s infinite alternate-reverse;
  }

  @keyframes float-flare {
    0% { transform: translate(0, 0) scale(1); opacity: 0.8; }
    100% { transform: translate(40px, -20px) scale(1.2); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="ribbon-container">
    <div class="ribbon ribbon-1"></div>
    <div class="ribbon ribbon-2"></div>
    <div class="ribbon ribbon-3"></div>
    
    <div class="flare flare-1"></div>
    <div class="flare flare-2"></div>
  </div>
</body>
</html>
